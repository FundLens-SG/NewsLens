*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;padding-top:var(--st);padding-bottom:var(--sb)}
button{cursor:pointer;border:none;font-family:inherit}input{font-family:inherit}

.hdr{background:var(--white);padding:16px 16px 14px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.chip{background:var(--bg);color:var(--t2);border:1.5px solid var(--bd);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;transition:all 0.15s}
.chip.on{background:#DCFCE7;color:#15803D;border-color:#86EFAC}.chip:active{transform:scale(0.95)}
.tabs{display:flex;overflow-x:auto;background:var(--white);border-bottom:1.5px solid var(--bd);position:sticky;top:90px;z-index:40}
.tab{flex:none;padding:11px 14px;font-size:12.5px;font-weight:700;color:var(--t3);background:none;border-bottom:2.5px solid transparent;transition:0.15s}.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;box-shadow:var(--sh);position:relative;transition:all 0.15s}
.card.sel{border-color:#86EFAC;background:#F0FDF4}.card:active{transform:scale(0.99)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:0.02em}
.b-high{background:#FEE2E2;color:#DC2626}.b-med{background:#FEF3C7;color:#D97706}.b-low{background:#DCFCE7;color:#16A34A}
.b-pre{background:#DBEAFE;color:#2563EB}.b-ret{background:#EDE9FE;color:#7C3AED}.b-hnw{background:#FEF3C7;color:#D97706}.b-all{background:#F1F5F9;color:#64748B}.b-src{background:#E0F2FE;color:#0284C7}
.act-bar{position:sticky;bottom:0;background:var(--white);border-top:1.5px solid var(--bd);padding:10px 16px calc(10px + var(--sb));display:flex;align-items:center;gap:6px;flex-wrap:wrap;z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,0.05)}
.abtn{padding:9px 14px;border-radius:12px;font-size:12px;font-weight:800;color:#FFF;transition:0.1s}.abtn:active{transform:scale(0.95)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 18px calc(20px + var(--sb))}
.finput{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--bd);border-radius:12px;color:var(--tx);font-size:14px;outline:none;margin-bottom:14px;font-weight:600}.finput:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(22,163,74,0.1)}
.spinner{width:20px;height:20px;border:3px solid var(--ac);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.wa-bubble{background:#E7FFDB;border-radius:0 16px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.65;color:#1E293B;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.email-box{background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;box-shadow:var(--sh)}
.seg-row{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px}.seg-pill{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;background:var(--bg);color:var(--t2);border:1.5px solid var(--bd);white-space:nowrap;transition:0.15s}.seg-pill.on{color:#FFF}
.photo-upload{width:60px;height:60px;border-radius:50%;background:var(--bg);border:2px dashed var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0}.photo-upload img{width:100%;height:100%;object-fit:cover}
.wa-share{width:100%;padding:13px;background:#25D366;color:#FFF;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;box-shadow:0 4px 14px rgba(37,211,102,0.3)}.wa-share:active{transform:scale(0.98)}
.cat-label{font-size:14px;font-weight:800;color:var(--tx);margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.empty{text-align:center;padding:40px 20px}.empty-ico{margin-bottom:10px}
