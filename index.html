async function api(path,method,body){
  var token=await getSbToken();
  if(!token)throw new Error("Not authenticated. Please log out and log in again.");
  var opts={method:method||"GET",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(SERVER+path,opts);
  var d=await res.json();
  if(!res.ok){
    if(res.status===401){
      /* Token expired — try refreshing and retry once */
      try{
        var r=await _sb.auth.refreshSession();
        if(r.data&&r.data.session){
          opts.headers["Authorization"]="Bearer "+r.data.session.access_token;
          var res2=await fetch(SERVER+path,opts);
          var d2=await res2.json();
          if(res2.ok)return d2;
        }
      }catch(e){}
      throw new Error("Session expired. Please log out and log in again.");
    }
    throw new Error(d.error||"Server error "+res.status);
  }
  return d;
}

function dedup(news){
  var out={};
  Object.keys(news).forEach(function(cat){
    var items=news[cat]||[];var seen={};var clean=[];

      /* Normalize: lowercase, remove punctuation, take first 40 chars */
      var key=(it.title||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").slice(0,40).trim();
      if(seen[key]){
        /* Merge: combine sources */
        var existing=seen[key];
        if(existing.source.indexOf(it.source)===-1)existing.source+=", "+it.source;
        if(!existing.url&&it.url)existing.url=it.url;
        if(impVal(it.impact)<impVal(existing.impact))existing.impact=it.impact;
      }else{seen[key]=it;clean.push(it)}
